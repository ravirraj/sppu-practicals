<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shopping Cart Record</title>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom scrollbar for a seamless look */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb { background: #14b8a6; }
    </style>
</head>
<body ng-app="myapp" ng-controller="CartForm" class="bg-slate-950 text-slate-300 font-sans min-h-screen p-8 selection:bg-teal-500/30">

    <div class="max-w-4xl mx-auto">
        <div class="mb-10 border-l-4 border-teal-400 pl-4">
            <h2 class="text-3xl font-bold text-white tracking-tight">Shopping Cart Record</h2>
            <p class="text-sm text-slate-500 mt-1 font-mono uppercase tracking-widest">AngularJS Dynamic Invoice</p>
        </div>

        <div class="bg-slate-900 border border-slate-800 shadow-2xl overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-950/50 border-b border-slate-800 text-teal-400 font-mono text-sm uppercase tracking-wider">
                            <th class="p-4 w-2/5">Description</th>
                            <th class="p-4 w-1/5">Qty</th>
                            <th class="p-4 w-1/5">Cost</th>
                            <th class="p-4 w-1/5">Total</th>
                            <th class="p-4 text-center">Remove</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-800/50">
                        <tr ng-repeat="item in cart.items" class="hover:bg-slate-800/20 transition-colors group">
                            <td class="p-4">
                                <input type="text" ng-model="item.description" placeholder="Item name..." 
                                       class="w-full bg-transparent border-b border-slate-700 focus:border-teal-400 focus:ring-0 text-white placeholder-slate-600 px-2 py-1 outline-none transition-colors">
                            </td>
                            <td class="p-4">
                                <input type="number" ng-model="item.qty" required min="1"
                                       class="w-full bg-slate-950 border border-slate-800 focus:border-teal-400 text-white px-3 py-1.5 outline-none rounded-none font-mono">
                            </td>
                            <td class="p-4">
                                <input type="number" ng-model="item.cost" required min="0" step="0.01"
                                       class="w-full bg-slate-950 border border-slate-800 focus:border-teal-400 text-white px-3 py-1.5 outline-none rounded-none font-mono">
                            </td>
                            <td class="p-4 font-mono text-slate-300">
                                {{item.qty * item.cost | currency: 'Rs '}}
                            </td>
                            <td class="p-4 text-center">
                                <button ng-click="removeItem($index)" 
                                        class="text-slate-500 hover:text-red-400 focus:outline-none font-mono font-bold transition-colors">
                                    [X]
                                </button>
                            </td>
                        </tr>
                    </tbody>
                    <tfoot>
                        <tr class="bg-slate-950/80 border-t-2 border-slate-700">
                            <td class="p-4">
                                <button ng-click="addItem()" 
                                        class="text-teal-400 hover:text-teal-300 font-mono text-sm uppercase tracking-wider transition-colors flex items-center gap-2">
                                    <span>+ Add Item</span>
                                </button>
                            </td>
                            <td></td>
                            <td class="p-4 text-right font-mono uppercase text-slate-500 tracking-wider text-sm">
                                Grand Total:
                            </td>
                            <td class="p-4 font-mono text-xl text-white font-bold tracking-tight">
                                {{total() | currency: 'Rs '}}
                            </td>
                            <td></td>
                        </tr>
                    </tfoot>
                </table>
            </div>
        </div>
    </div>

    <script>
        var app = angular.module('myapp', []);
        
        app.controller('CartForm', function($scope) {
            $scope.cart = {
                items: [{ qty: 1, description: 'Default Item', cost: 0 }]
            };

            $scope.addItem = function() {
                $scope.cart.items.push({ qty: 1, description: '', cost: 0 });
            };

            $scope.removeItem = function(index) {
                $scope.cart.items.splice(index, 1);
            };

            $scope.total = function() {
                var total = 0;
                angular.forEach($scope.cart.items, function(item) {
                    total += (item.qty * item.cost);
                });
                return total;
            };
        });
    </script>
</body>
</html>
