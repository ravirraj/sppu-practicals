<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Directory</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1 class="header-title">Employee Directory</h1>
            <p class="header-subtitle">Manage organization talent.</p>
        </header>
        <div class="main-layout">
            <div class="card">
                <h2 class="card-title">New Employee</h2>
                <div id="alert" class="alert hidden"></div>
                <form id="add-form">
                    <div class="form-grid">
                        <input type="text" name="first_name" placeholder="First Name" required class="form-input">
                        <input type="text" name="last_name" placeholder="Last Name" required class="form-input">
                    </div>
                    <input type="email" name="email" placeholder="Email Address" required class="form-input">
                    <input type="tel" name="mobile_no" placeholder="Mobile Number" required class="form-input">
                    
                    <div class="form-grid">
                        <select name="gender" required class="form-input">
                            <option value="" disabled selected>Gender</option>
                            <option>Male</option><option>Female</option><option>Other</option>
                        </select>
                        <select name="role" required class="form-input">
                            <option value="" disabled selected>Role</option>
                            <option>Developer</option><option>Tester</option><option>Technician</option><option>Manager</option><option>Designer</option>
                        </select>
                    </div>
                    <input type="number" step="0.01" name="salary" placeholder="Salary ($)" required class="form-input">
                    <button type="submit" id="submit-btn" class="btn-submit">
                        Add Employee
                    </button>
                </form>
            </div>
            <div class="card table-card table-section">
                <div class="table-header">
                    <h2>Database</h2>
                    <select id="filter" class="filter-select">
                        <option value="All">All Roles</option>
                        <option>Developer</option><option>Tester</option><option>Technician</option><option>Manager</option><option>Designer</option>
                    </select>
                </div>
                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th>Employee</th>
                                <th>Role</th>
                                <th>Contact</th>
                                <th class="text-right">Salary</th>
                            </tr>
                        </thead>
                        <tbody id="table-body">
                            <tr><td colspan="4" class="td-center text-muted">Loading data...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <script>
        const form = document.getElementById('add-form');
        const tbody = document.getElementById('table-body');
        const filter = document.getElementById('filter');
        const alertBox = document.getElementById('alert');
        const btn = document.getElementById('submit-btn');
        const fetchEmployees = async (role = 'All') => {
            tbody.innerHTML = `<tr><td colspan="4" class="td-center text-muted animate-pulse">Synchronizing...</td></tr>`;
            try {
                const res = await fetch(`fetch_employees.php?role=${role}`);
                const result = await res.json();
                if (!result.success) throw new Error(result.message);
                tbody.innerHTML = result.data.length ? result.data.map(emp => `
                    <tr class="hoverable">
                        <td>
                            <div class="emp-name">${emp.first_name} ${emp.last_name}</div>
                            <div class="emp-gender">${emp.gender}</div>
                        </td>
                        <td>
                            <span class="emp-role">${emp.role}</span>
                        </td>
                        <td>
                            <div class="emp-email">${emp.email}</div>
                            <div class="emp-phone">${emp.mobile_no}</div>
                        </td>
                        <td class="emp-salary">
                            $${parseFloat(emp.salary).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}
                        </td>
                    </tr>
                `).join('') : `<tr><td colspan="4" class="td-center text-empty">No records found.</td></tr>`;
            } catch (err) {
                tbody.innerHTML = `<tr><td colspan="4" class="td-center err-row">Connection Error</td></tr>`;
            }
        };
        filter.addEventListener('change', (e) => fetchEmployees(e.target.value));
        fetchEmployees();
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            btn.textContent = 'Saving...'; 
            btn.disabled = true;
            alertBox.classList.add('hidden');
            alertBox.classList.remove('success', 'error');
            try {
                const res = await fetch('insert_employee.php', { method: 'POST', body: new FormData(form) });
                const result = await res.json();
                alertBox.classList.add(result.success ? 'success' : 'error');
                alertBox.textContent = result.success ? 'Employee added successfully.' : (result.message || 'Error occurred.');
                alertBox.classList.remove('hidden');
                if (result.success) {
                    form.reset();
                    fetchEmployees(filter.value);
                    setTimeout(() => alertBox.classList.add('hidden'), 3500);
                }
            } catch (error) {
                alertBox.classList.add('error');
                alertBox.textContent = 'Network error: Failed to communicate with server.';
                alertBox.classList.remove('hidden');
            } finally {
                btn.textContent = 'Add Employee'; 
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
