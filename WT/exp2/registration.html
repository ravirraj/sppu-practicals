<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>User Registration System v1.0</title>
    <style>
      body {
        background-color: #008080; /* Classic Win95 Teal */
        font-family: "MS Sans Serif", Arial, sans-serif;
        font-size: 12px;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }
      .window {
        background-color: #c0c0c0;
        border: 2px solid;
        border-color: #fff #808080 #808080 #fff;
        padding: 2px;
        width: 400px;
      }
      .title-bar {
        background: linear-gradient(90deg, #000080, #1084d0);
        color: white;
        padding: 3px 5px;
        font-weight: bold;
        display: flex;
        justify-content: space-between;
      }
      .content {
        padding: 15px;
      }
      fieldset {
        border: 2px solid;
        border-color: #808080 #fff #fff #808080;
        margin-bottom: 10px;
        padding: 10px;
      }
      legend {
        font-weight: bold;
      }
      table {
        width: 100%;
        border-spacing: 5px;
      }
      td {
        white-space: nowrap;
      }

      input[type="text"],
      input[type="email"],
      input[type="tel"],
      select {
        border: 2px solid;
        border-color: #808080 #fff #fff #808080;
        background: #fff;
        padding: 2px;
        width: 100%;
      }

      .btn-group {
        text-align: right;
        margin-top: 10px;
      }
      input[type="submit"],
      input[type="reset"] {
        background: #c0c0c0;
        border: 2px solid;
        border-color: #fff #808080 #808080 #fff;
        padding: 4px 15px;
        min-width: 80px;
        cursor: pointer;
        font-size: 12px;
      }
      input[type="submit"]:active,
      input[type="reset"]:active {
        border-color: #808080 #fff #fff #808080;
      }
      h1 {
        font-size: 16px;
        margin: 0 0 10px 0;
        text-align: center;
        color: #000;
      }
    </style>
  </head>
  <body>
    <div class="window">
      <div class="title-bar">
        <span>Registration.exe</span>
        <span>[?] [X]</span>
      </div>
      <div class="content">
        <h1>New User Setup</h1>
        <form id="regForm">
          <fieldset>
            <legend>Personal Information</legend>
            <table>
              <tr>
                <td>First Name:</td>
                <td><input type="text" name="fn" required /></td>
              </tr>
              <tr>
                <td>Last Name:</td>
                <td><input type="text" name="ln" required /></td>
              </tr>
              <tr>
                <td>Gender:</td>
                <td>
                  <select name="gender">
                    <option>Male</option>
                    <option>Female</option>
                  </select>
                </td>
              </tr>
            </table>
          </fieldset>

          <fieldset>
            <legend>Account Details</legend>
            <table>
              <tr>
                <td>Email:</td>
                <td><input type="email" name="email" required /></td>
              </tr>
              <tr>
                <td>Contact:</td>
                <td><input type="tel" name="tel" required /></td>
              </tr>
            </table>
          </fieldset>

          <div class="btn-group">
            <input type="reset" value="Clear" />
            <input type="submit" value="OK" />
          </div>
        </form>
      </div>
    </div>

    <script>
      document.getElementById("regForm").onsubmit = function (e) {
        e.preventDefault();
        alert("Registration Successful!");
        this.reset();
      };
    </script>
  </body>
</html>
