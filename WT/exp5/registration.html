<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Student Registration</title>
    <style>
      body {
        background-color: #008080; /* Classic Win95 Teal */
        font-family: "MS Sans Serif", Arial, sans-serif;
        font-size: 11px;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
      }
      .window {
        background-color: #c0c0c0;
        border: 2px solid;
        border-color: #fff #808080 #808080 #fff;
        padding: 2px;
        width: 420px;
      }
      .title-bar {
        background: linear-gradient(90deg, #000080, #1084d0);
        color: white;
        padding: 3px 5px;
        font-weight: bold;
        display: flex;
        justify-content: space-between;
      }
      .content {
        padding: 10px;
        border: 1px solid #808080;
        margin: 2px;
      }
      .header {
        background-color: Tomato;
        color: white;
        text-align: center;
        padding: 5px;
        border: 2px inset #fff;
        margin-bottom: 15px;
      }
      table {
        width: 100%;
        border-spacing: 4px;
      }
      td {
        white-space: nowrap;
      }

      input[type="text"],
      input[type="password"] {
        border: 2px solid;
        border-color: #808080 #fff #fff #808080; /* Inset look */
        background: #fff;
        padding: 2px;
        width: 100%;
      }

      .footer-info {
        font-size: 10px;
        margin-top: 10px;
        border-top: 1px solid #808080;
        padding-top: 5px;
      }
      .btn-row {
        text-align: right;
        margin-top: 10px;
      }

      input[type="submit"],
      input[type="reset"] {
        background: #c0c0c0;
        border: 2px solid;
        border-color: #fff #808080 #808080 #fff; /* Outset look */
        padding: 3px 15px;
        cursor: pointer;
        min-width: 80px;
      }
      input:active {
        border-color: #808080 #fff #fff #808080;
      }
    </style>
  </head>
  <body>
    <div class="window">
      <div class="title-bar">
        <span>Student_Registration.exe</span>
        <span>[?] [X]</span>
      </div>
      <div class="content">
        <div class="header">STUDENT REGISTRATION</div>
        <form action="registration.jsp" method="POST">
          <table>
            <tr>
              <td>Name*:</td>
              <td><input type="text" name="name" required /></td>
            </tr>
            <tr>
              <td>Gender*:</td>
              <td>
                <input type="radio" name="gender" value="male" checked /> Male
                <input type="radio" name="gender" value="female" /> Female
              </td>
            </tr>
            <tr>
              <td>Email*:</td>
              <td><input type="text" name="email" required /></td>
            </tr>
            <tr>
              <td>College*:</td>
              <td><input type="text" name="college" required /></td>
            </tr>
            <tr>
              <td>Branch*:</td>
              <td><input type="text" name="branch" required /></td>
            </tr>
            <tr>
              <td>Mobile*:</td>
              <td><input type="text" name="mobile" required /></td>
            </tr>
            <tr>
              <td>Username*:</td>
              <td><input type="text" name="username" required /></td>
            </tr>
            <tr>
              <td>Password*:</td>
              <td><input type="password" name="password" required /></td>
            </tr>
          </table>

          <div class="btn-row">
            <input type="reset" value="Reset" />
            <input type="submit" value="Submit" />
          </div>

          <div class="footer-info">
            (*) Field indicates field is mandatory!!
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
