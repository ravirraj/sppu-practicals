<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Banking Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body
    class="bg-slate-950 text-slate-300 font-sans min-h-screen flex items-center justify-center p-4 selection:bg-teal-500/30"
  >
    <div
      class="bg-slate-900 border border-slate-800 shadow-2xl p-8 max-w-md w-full"
    >
      <div class="mb-8 border-l-4 border-teal-400 pl-4">
        <h2 class="text-2xl font-bold text-white tracking-tight">ATM Portal</h2>
        <p class="text-sm font-mono text-slate-500 uppercase tracking-widest">
          EJB Transaction System
        </p>
      </div>

      <form action="transact" method="POST" class="space-y-6">
        <div>
          <label class="block text-sm font-mono text-slate-400 mb-2"
            >Transaction Amount (Rs)</label
          >
          <input
            type="number"
            name="amount"
            required
            min="1"
            class="w-full bg-slate-950 border border-slate-700 focus:border-teal-400 text-white px-4 py-3 outline-none font-mono transition-colors placeholder-slate-600"
            placeholder="e.g. 5000"
          />
        </div>

        <div class="flex gap-4">
          <label class="flex-1 cursor-pointer">
            <input
              type="radio"
              name="action"
              value="deposit"
              class="peer sr-only"
              required
              checked
            />
            <div
              class="text-center py-3 border border-slate-700 text-slate-400 peer-checked:border-teal-400 peer-checked:text-teal-400 hover:bg-slate-800 transition-colors font-mono uppercase text-sm font-bold"
            >
              Deposit
            </div>
          </label>
          <label class="flex-1 cursor-pointer">
            <input
              type="radio"
              name="action"
              value="withdraw"
              class="peer sr-only"
              required
            />
            <div
              class="text-center py-3 border border-slate-700 text-slate-400 peer-checked:border-teal-400 peer-checked:text-teal-400 hover:bg-slate-800 transition-colors font-mono uppercase text-sm font-bold"
            >
              Withdraw
            </div>
          </label>
        </div>

        <button
          type="submit"
          class="w-full mt-4 bg-teal-500/10 text-teal-400 border border-teal-500/50 hover:bg-teal-500/20 py-4 font-mono font-bold tracking-widest uppercase transition-colors"
        >
          Execute Transaction
        </button>
      </form>
    </div>
  </body>
</html>
